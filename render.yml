services:
  - type: web
    name: sunbeam-academy
    runtime: image
    repo: https://github.com/yourusername/sunbeam-academy
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://sunbeam-academy.onrender.com
      - key: APP_KEY
        sync: false